<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ME.MORI Class - workshop kể chuyện bằng hình ảnh, quay dựng và tư duy cinematic cho creator.">
  <title>ME.MORI Class</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Lora:ital,wght@1,600;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      min-height: 100vh;
      overflow-x: hidden;
      background: #fff8ec;
      color: #161412;
      font-family: "Be Vietnam Pro", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    img, video, iframe { display: block; width: 100%; }
    .container { width: min(1120px, calc(100% - 32px)); margin: 0 auto; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255, 248, 236, 0.92);
      border-bottom: 1px solid rgba(22, 20, 18, 0.08);
      backdrop-filter: blur(14px);
    }
    .nav {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      min-height: 76px;
      gap: 24px;
    }
    .nav-links, .nav-actions { display: flex; align-items: center; gap: 22px; }
    .nav-actions { justify-content: flex-end; }
    .brand { font-size: 23px; font-weight: 800; letter-spacing: 0.12em; white-space: nowrap; }
    .nav a { font-size: 14px; font-weight: 700; }
    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 46px;
      padding: 0 22px;
      border-radius: 999px;
      background: #161412;
      color: #fff;
      font-weight: 800;
    }
    .pill.secondary { background: #f0d281; color: #161412; }
    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(320px, 0.95fr);
      align-items: center;
      gap: 56px;
      padding: 72px 0 84px;
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 22px;
      color: #7a5222;
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
    }
    .eyebrow::before { width: 34px; height: 2px; background: #d99b27; content: ""; }
    h1, h2, h3 { letter-spacing: 0; }
    h1 { max-width: 700px; font-size: clamp(48px, 7vw, 86px); line-height: 0.98; font-weight: 800; }
    .script { font-family: "Lora", serif; font-style: italic; font-weight: 700; }
    .hero p, .section-copy { max-width: 620px; color: #5f574d; font-size: 18px; line-height: 1.8; }
    .hero p { margin: 26px 0 34px; }
    .hero-actions { display: flex; flex-wrap: wrap; gap: 14px; }
    .hero-media {
      position: relative;
      min-height: 620px;
      overflow: hidden;
      border-radius: 26px;
      background: #e8cf9a;
      box-shadow: 0 26px 80px rgba(38, 30, 17, 0.2);
    }
    .hero-media img, .hero-media video, .hero-media iframe { height: 620px; object-fit: cover; border: 0; }
    .hero-note {
      position: absolute;
      right: 24px;
      bottom: 24px;
      max-width: 280px;
      padding: 20px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 18px 50px rgba(22, 20, 18, 0.18);
      color: #2a241d;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.6;
    }
    section { padding: 88px 0; }
    .light { background: #fff; }
    .dark { background: #171513; color: #fff; }
    .dark .section-copy { color: #d3c9bd; }
    .section-heading {
      display: grid;
      grid-template-columns: minmax(0, 0.8fr) minmax(280px, 0.55fr);
      align-items: end;
      gap: 40px;
      margin-bottom: 42px;
    }
    h2 { font-size: clamp(34px, 5vw, 58px); line-height: 1.05; font-weight: 800; }
    .cards, .course-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
    .card {
      min-height: 260px;
      padding: 28px;
      border: 1px solid rgba(22, 20, 18, 0.08);
      border-radius: 8px;
      background: #fffaf1;
    }
    .card i {
      display: inline-flex;
      width: 54px;
      height: 54px;
      align-items: center;
      justify-content: center;
      margin-bottom: 22px;
      border-radius: 50%;
      background: #f1c55f;
      font-size: 22px;
    }
    .card h3, .course h3 { margin-bottom: 14px; font-size: 23px; }
    .card p, .course p, .step p { color: #645b51; line-height: 1.7; }
    .course { overflow: hidden; border-radius: 8px; background: #fff; color: #161412; }
    .course img, .course video { height: 245px; object-fit: cover; }
    .course-content { padding: 24px; }
    
    .steps { display: grid; grid-template-columns: 0.9fr 1.1fr; gap: 42px; align-items: center; }
    .step-list { display: grid; gap: 16px; }
    
    /* NÂNG CẤP THẺ BƯỚC LỘ TRÌNH: CÓ HIỆU ỨNG BẤM, TỰ CO GIÃN THEO SỐ LƯỢNG */
    .step { 
      display: flex; gap: 16px; align-items: flex-start; padding: 20px; 
      border-radius: 8px; background: #fff; cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
    }
    .step:hover {
      transform: translateX(6px);
      background-color: #fffdf4;
      box-shadow: 0 12px 35px rgba(217, 155, 39, 0.1);
    }
    .step span {
      display: inline-flex; width: 34px; height: 34px; flex: 0 0 34px;
      align-items: center; justify-content: center; border-radius: 50%;
      background: #171513; color: #fff; font-weight: 800;
    }
    .step strong { display: block; margin-bottom: 5px; font-size: 16px; }

    .cta { padding: 72px 0; background: #efc45b; }
    .cta-row { display: flex; align-items: center; justify-content: space-between; gap: 28px; }
    .cta h2 { max-width: 720px; }
    footer { padding: 58px 0; background: #171513; color: #fff; }
    .footer-grid { display: grid; grid-template-columns: 1.5fr repeat(3, 1fr); gap: 30px; }
    footer p, footer li { color: #c8c0b5; line-height: 1.8; }
    footer ul { list-style: none; }
    footer h3 { margin-bottom: 16px; font-size: 16px; }
    
    /* GIAO DIỆN KHUNG POPUP VIDEO (MODAL) */
    .v-modal {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
    }
    .v-modal.show { opacity: 1; pointer-events: auto; }
    .v-modal-bg { position: absolute; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); }
    .v-modal-content {
      position: relative; width: min(900px, 92%); aspect-ratio: 16/9;
      background: #000; border-radius: 16px; overflow: hidden; z-index: 10;
      box-shadow: 0 25px 60px rgba(0,0,0,0.5);
    }
    .v-modal-close {
      position: absolute; top: 12px; right: 16px; z-index: 11;
      background: rgba(255,255,255,0.25); border: 0; color: #fff;
      font-size: 28px; width: 38px; height: 38px; line-height: 34px;
      border-radius: 50%; cursor: pointer; transition: background 0.2s;
    }
    .v-modal-close:hover { background: rgba(255,255,255,0.45); }
    .v-modal-content iframe, .v-modal-content video { width: 100%; height: 100%; border: 0; }

    @media (max-width: 900px) {
      .nav { grid-template-columns: 1fr; padding: 18px 0; text-align: center; }
      .nav-links, .nav-actions { justify-content: center; flex-wrap: wrap; }
      .hero, .section-heading, .steps, .cta-row, .footer-grid { grid-template-columns: 1fr; }
      .hero { padding-top: 48px; }
      .hero-media, .hero-media img, .hero-media video, .hero-media iframe { min-height: 420px; height: 420px; }
      .cards, .course-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 560px) {
      .container { width: min(100% - 24px, 1120px); }
      .nav-links { display: none; }
      .brand { font-size: 20px; }
      h1 { font-size: 44px; }
      .hero-note { right: 14px; bottom: 14px; left: 14px; max-width: none; }
      section { padding: 64px 0; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <nav class="container nav" aria-label="Điều hướng chính">
      <div class="nav-links" id="navLinks"></div>
      <a class="brand" id="brand" href="#">ME.MORI</a>
      <div class="nav-actions">
        <a id="navCourses" href="#courses">Khóa học</a>
        <a class="pill" id="navCta" href="#contact">Đăng ký</a>
      </div>
    </nav>
  </header>

  <main>
    <section class="container hero">
      <div>
        <div class="eyebrow" id="heroEyebrow"></div>
        <h1><span id="heroTitleStart"></span> <span class="script" id="heroTitleScript"></span> <span id="heroTitleEnd"></span></h1>
        <p id="heroText"></p>
        <div class="hero-actions">
          <a class="pill" id="heroPrimary"></a>
          <a class="pill secondary" id="heroSecondary"></a>
        </div>
      </div>
      <div class="hero-media">
        <div id="heroMedia"></div>
        <div class="hero-note" id="heroNote"></div>
      </div>
    </section>

    <section id="workshops" class="light">
      <div class="container">
        <div class="section-heading">
          <h2 id="introTitle"></h2>
          <p class="section-copy" id="introText"></p>
        </div>
        <div class="cards" id="features"></div>
      </div>
    </section>

    <section id="courses" class="dark">
      <div class="container">
        <div class="section-heading">
          <h2><span id="coursesTitle"></span> <span class="script" id="coursesTitleScript"></span></h2>
          <p class="section-copy" id="coursesText"></p>
        </div>
        <div class="course-grid" id="courseGrid"></div>
      </div>
    </section>

    <section id="method">
      <div class="container steps">
        <div>
          <div class="eyebrow" id="methodEyebrow"></div>
          <h2 id="methodTitle"></h2>
          <p class="section-copy" id="methodText"></p>
        </div>
        <div class="step-list" id="steps"></div>
      </div>
    </section>

    <section id="contact" class="cta">
      <div class="container cta-row">
        <h2 id="ctaTitle"></h2>
        <a class="pill" id="ctaLink"><i class="fa-solid fa-envelope" aria-hidden="true"></i> <span></span></a>
      </div>
    </section>
  </main>

  <footer>
    <div class="container footer-grid" id="footerGrid"></div>
  </footer>

  <div id="videoModal" class="v-modal">
    <div class="v-modal-bg"></div>
    <div class="v-modal-content">
      <button class="v-modal-close" id="modalCloseBtn">&times;</button>
      <div id="vModalBody" style="width:100%; height:100%;"></div>
    </div>
  </div>

  <script>
    // DỮ LIỆU DỰ PHÒNG CHUẨN ĐÃ ĐƯỢC CHUYỂN THÀNH LỘ TRÌNH TỰ ĐỘNG + LINK VIDEO
    const fallbackContent = {

        titleStart: "Học nghệ thuật",

        titleEnd: "bằng hình ảnh",
        text: "Workshop dành cho creator muốn xây dựng tư duy cinematic, quay dựng có cảm xúc và biến ý tưởng thành câu chuyện rõ ràng trên màn hình.",

        title: "Không gian học tập cho người làm hình ảnh hiện đại",
        text: "ME.MORI Class kết hợp điện ảnh, storytelling và kỹ năng sản xuất nội dung để giúp học viên biết mình muốn kể gì, vì sao câu chuyện đáng xem và nên thể hiện nó như thế nào."

      features: [
        { icon: "fa-film", title: "Tư duy cinematic", text: "Hiểu nhịp dựng, khung hình, chuyển cảnh và cách tạo cảm xúc bằng lựa chọn thị giác." },
        { icon: "fa-camera", title: "Thực hành thật", text: "Làm bài tập tại lớp, quay dựng theo brief và nhận phản hồi để cải thiện từng phiên bản." },
        { icon: "fa-users", title: "Cộng đồng creator", text: "Kết nối với những người cùng quan tâm đến video, điện ảnh và kể chuyện bằng hình ảnh." }
      ],
      coursesSection: {
        title: "Workshop",
        titleScript: "nổi bật",
        text: "Các lớp được thiết kế ngắn gọn, tập trung vào kỹ năng có thể áp dụng ngay cho video cá nhân, thương hiệu hoặc dự án sáng tạo."
      },
      courses: [
        {
          title: "Storytelling cho video ngắn",
          text: "Xây cấu trúc câu chuyện, mở đầu cuốn hút và thông điệp dễ nhớ.",
          mediaType: "image",
          mediaUrl: "https://images.unsplash.com/photo-1503676260728-1c00da094a0b?q=80&w=1400&auto=format&fit=crop",
          mediaAlt: "Không gian workshop với sổ ghi chép và laptop"
        },
        {
          title: "Tư duy hình ảnh cinematic",
          text: "Rèn bố cục, ánh sáng, chuyển động máy và nhịp cảm xúc.",
          mediaType: "image",
          mediaUrl: "https://images.unsplash.com/photo-1516035069371-29a1b244cc32?q=80&w=1400&auto=format&fit=crop",
          mediaAlt: "Máy quay trong buổi thực hành video"
        },
        {
          title: "Quay dựng cho creator",

          mediaType: "image",
          mediaUrl: "https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1400&auto=format&fit=crop",
          mediaAlt: "Học viên đang học cùng laptop"
        }
      ],
      method: {
        eyebrow: "Lộ trình",
        title: "Trải nghiệm phẩm chất",
        text: "Mỗi buổi học tập trung vào một kỹ năng rõ ràng, có ví dụ, có thực hành và có feedback để học viên thấy tiến bộ ngay trong sản phẩm của mình."
      },
      
      // SỐ LƯỢNG BƯỚC TÙY Ý - BẬT KÈM LINK VIDEO TƯƠNG ỨNG
      steps: [
        { title: "Đăng ký workshop", text: "Chọn chủ đề phù hợp với mục tiêu và kinh nghiệm hiện tại.", videoUrl: "https://www.youtube.com/watch?v=kXKm842UXiY" },
        { title: "Thực hành tại lớp", text: "Làm bài tập theo brief, nhận hướng dẫn và chỉnh sửa trực tiếp.", videoUrl: "https://www.youtube.com/watch?v=kXKm842UXiY" },
        { title: "Hoàn thiện sản phẩm", text: "Nhận feedback để cải thiện câu chuyện, nhịp dựng và hình ảnh.", videoUrl: "https://www.youtube.com/watch?v=kXKm842UXiY" }
      ],
      cta: {
        title: "Sẵn sàng cho hành trình kể chuyện bằng hình ảnh?",
        label: "Liên hệ đăng ký",
        href: "mailto:hello@memori.class"
      },
      footer: {
        intro: "Không gian học tập dành cho người yêu điện ảnh, storytelling và nghệ thuật hình ảnh hiện đại.",
        columns: [
          { title: "Khóa học", items: ["Video ngắn", "Tư duy cinematic", "Quay dựng creator"] },
          { title: "Cộng đồng", items: ["Workshop", "Feedback nhóm", "Dự án học viên"] },
          { title: "Liên hệ", items: ["Instagram", "Facebook", "hello@memori.class"] }
        ]
      }
    };

    const setText = (id, value) => { document.getElementById(id).textContent = value || ""; };
    const setLink = (id, item) => {
      const el = document.getElementById(id);
      el.href = item?.href || "#";
      if (item?.label) el.textContent = item.label;
    };

    const getYouTubeId = (url) => {
      try {
        const parsed = new URL(url);
        if (parsed.hostname.includes("youtu.be")) return parsed.pathname.split("/").filter(Boolean)[0] || "";
        if (parsed.pathname.startsWith("/shorts/")) return parsed.pathname.split("/").filter(Boolean)[1] || "";
        if (parsed.pathname.startsWith("/embed/")) return parsed.pathname.split("/").filter(Boolean)[1] || "";
        return parsed.searchParams.get("v") || "";
      } catch { return ""; }
    };

    const mediaMarkup = (item, className = "") => {
      const url = item?.mediaUrl || "";
      const alt = item?.mediaAlt || "";
      const youtubeId = getYouTubeId(url);

      if (youtubeId) {
        return `<iframe class="${className}" src="https://www.youtube.com/embed/${youtubeId}?autoplay=1&mute=1&controls=0&loop=1&playlist=${youtubeId}&playsinline=1&rel=0&modestbranding=1" title="${escapeHtml(alt)}" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>`;
      }

      const type = item?.mediaType === "video" ? "video" : "image";
      if (type === "video") {
        return `<video class="${className}" src="${url}" aria-label="${escapeHtml(alt)}" autoplay muted loop playsinline controls></video>`;
      }
      return `<img class="${className}" src="${url}" alt="${escapeHtml(alt)}">`;
    };

    const escapeHtml = (value = "") => String(value).replace(/[&<>"']/g, (char) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
    }[char]));

    // LOGIC ĐIỀU KHIỂN ĐÓNG/MỞ KHUNG VIDEO POPUP
    const modal = document.getElementById("videoModal");
    const modalBody = document.getElementById("vModalBody");

    function openModalVideo(url) {
      const youtubeId = getYouTubeId(url);
      if (youtubeId) {
        modalBody.innerHTML = `<iframe src="https://www.youtube.com/embed/${youtubeId}?autoplay=1&controls=1&rel=0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
      } else {
        modalBody.innerHTML = `<video src="${url}" autoplay controls playsinline></video>`;
      }
      modal.classList.add("show");
    }

    function closeModalVideo() {
      modal.classList.remove("show");
      modalBody.innerHTML = ""; // Xóa ruột để tắt tiếng video đang chạy ngầm ngay lập tức
    }

    document.getElementById("modalCloseBtn").addEventListener("click", closeModalVideo);
    document.querySelector(".v-modal-bg").addEventListener("click", closeModalVideo);

    function render(content) {
      document.title = content.site.title;
      document.querySelector('meta[name="description"]').content = content.site.description;
      setText("brand", content.site.brand);
      document.getElementById("navLinks").innerHTML = content.nav.map((item) => `<a href="${escapeHtml(item.href)}">${escapeHtml(item.label)}</a>`).join("");
      setLink("navCourses", content.navCourses);
      setLink("navCta", content.navCta);
      setText("heroEyebrow", content.hero.eyebrow);
      setText("heroTitleStart", content.hero.titleStart);
      setText("heroTitleScript", content.hero.titleScript);
      setText("heroTitleEnd", content.hero.titleEnd);
      setText("heroText", content.hero.text);
      setLink("heroPrimary", content.hero.primary);
      setLink("heroSecondary", content.hero.secondary);
      document.getElementById("heroMedia").innerHTML = mediaMarkup(content.hero);
      setText("heroNote", content.hero.note);
      setText("introTitle", content.intro.title);
      setText("introText", content.intro.text);
      document.getElementById("features").innerHTML = content.features.map((item) => `
        <article class="card">
          <i class="fa-solid ${escapeHtml(item.icon)}" aria-hidden="true"></i>
          <h3>${escapeHtml(item.title)}</h3>
          <p>${escapeHtml(item.text)}</p>
        </article>
      `).join("");
      setText("coursesTitle", content.coursesSection.title);
      setText("coursesTitleScript", content.coursesSection.titleScript);
      setText("coursesText", content.coursesSection.text);
      document.getElementById("courseGrid").innerHTML = content.courses.map((item) => `
        <article class="course">
          ${mediaMarkup(item)}
          <div class="course-content">
            <h3>${escapeHtml(item.title)}</h3>
            <p>${escapeHtml(item.text)}</p>
          </div>
        </article>
      `).join("");
      
      setText("methodEyebrow", content.method.eyebrow);
      setText("methodTitle", content.method.title);
      setText("methodText", content.method.text);

      // SỬA ĐỔI: TỰ ĐỘNG BIÊN DỊCH VÀO THÀNH LỘ TRÌNH VÔ HẠN BƯỚC + GẮN SỰ KIỆN CLICK VIDEO
      document.getElementById("steps").innerHTML = content.steps.map((item, index) => `
        <div class="step" data-video="${escapeHtml(item.videoUrl || '')}">
          <span>${index + 1}</span>
          <div style="flex: 1;">
            <strong>${escapeHtml(item.title)}</strong>
            <p>${escapeHtml(item.text)}</p>
          </div>
          <i class="fa-solid fa-circle-play" style="color: #d99b27; font-size: 20px; align-self: center; margin-left: 10px; opacity: 0.8;"></i>
        </div>
      `).join("");

      // Gắn trình lắng nghe sự kiện click mở video cho từng thẻ bước
      document.querySelectorAll(".step").forEach((stepCard) => {
        stepCard.addEventListener("click", () => {
          const videoUrl = stepCard.dataset.video;
          if (videoUrl) openModalVideo(videoUrl);
        });
      });

      setText("ctaTitle", content.cta.title);
      const ctaLink = document.getElementById("ctaLink");
      ctaLink.href = content.cta.href;
      ctaLink.querySelector("span").textContent = content.cta.label;
      document.getElementById("footerGrid").innerHTML = `
        <div>
          <div class="brand">${escapeHtml(content.site.brand)}</div>
          <p>${escapeHtml(content.footer.intro)}</p>
        </div>
        ${content.footer.columns.map((column) => `
          <div>
            <h3>${escapeHtml(column.title)}</h3>
            <ul>${column.items.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>
          </div>
        `).join("")}
      `;
    }

    fetch("content.json", { cache: "no-store" })
      .then((response) => response.ok ? response.json() : fallbackContent)
      .then(render)
      .catch(() => render(fallbackContent));
  </script>
</body>
</html>
